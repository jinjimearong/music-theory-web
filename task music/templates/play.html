<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자유 연주 모드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background-color: #f4f4f4; user-select: none; margin: 0; padding: 20px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto; }
        .home-btn { padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        
        /* 다중 코드 해석을 보여주는 UI 컨테이너 */
        #chord-display-container { height: 140px; display: flex; flex-direction: column; justify-content: center; margin: 10px 0; }
        #primary-chord { font-size: 5em; font-weight: bold; color: #2c3e50; margin: 0; line-height: 1; }
        #alternative-chords { font-size: 1.5em; color: #7f8c8d; margin-top: 10px; min-height: 30px; font-weight: bold; }
        
        .controls { margin-bottom: 20px; }
        .controls button { font-size: 1.2rem; padding: 5px 15px; margin: 0 10px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; }
        .controls span { font-size: 1.2rem; font-weight: bold; }

        .piano-wrapper { overflow-x: auto; padding-bottom: 20px; }
        .piano { display: inline-block; position: relative; white-space: nowrap; }
        .key { display: inline-block; border: 1px solid #000; border-radius: 0 0 5px 5px; cursor: pointer; position: relative; box-sizing: border-box; }
        
        /* 텍스트 짤림 방지 완벽 해결 CSS */
        .key span { position: absolute; left: 0; width: 100%; text-align: center; font-size: 12px; font-weight: bold; pointer-events: none; }
        
        .white-key { width: 35px; height: 160px; background-color: white; z-index: 1; vertical-align: top; }
        .white-key span { bottom: 10px; color: #e74c3c; } 
        .black-key { width: 22px; height: 100px; background-color: black; position: absolute; margin-left: -11px; z-index: 2; }
        .black-key span { bottom: 10px; color: #e74c3c; }
        
        .key.active, .white-key:active, .black-key:active { background-color: #27ae60 !important; box-shadow: inset 0 0 10px #1e8449; }
        #loading { color: #e74c3c; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header-container">
        <a href="/" class="home-btn">← 홈으로</a>
        <h1>자유 연주 모드 (49건반)</h1>
        <div style="width: 80px;"></div>
    </div>

    <div id="loading">피아노 소리를 불러오는 중입니다...</div>
    
    <div id="chord-display-container">
        <div id="primary-chord">-</div>
        <div id="alternative-chords"></div>
    </div>

    <div class="controls">
        <button id="octave-down">◀ 옥타브 내림</button>
        <span id="current-octave-display">키보드 매핑 옥타브: 4</span>
        <button id="octave-up">옥타브 올림 ▶</button>
    </div>

    <div class="piano-wrapper">
        <div class="piano" id="piano"></div>
    </div>

    <script>
        const sampler = new Tone.Sampler({
            urls: { "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", "A4": "A4.mp3", "C5": "C5.mp3" },
            release: 1, baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => {
                document.getElementById('loading').innerText = "피아노 로딩 완료! 여러 건반을 눌러 코드를 분석해 보세요.";
                document.getElementById('loading').style.color = "#27ae60";
            }
        }).toDestination();

        let activeNotes = new Set();
        let baseOctave = 4; 
        let currentLang = 'en';

        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const keyCharsEn = ['a', 'w', 's', 'e', 'd', 'f', 't', 'g', 'y', 'h', 'u', 'j', 'k'];
        const keyCharsKo = ['ㅁ', 'ㅈ', 'ㄴ', 'ㄷ', 'ㅇ', 'ㄹ', 'ㅅ', 'ㅎ', 'ㅛ', 'ㅗ', 'ㅕ', 'ㅓ', 'ㅏ'];
        const keyCodes   = ['KeyA', 'KeyW', 'KeyS', 'KeyE', 'KeyD', 'KeyF', 'KeyT', 'KeyG', 'KeyY', 'KeyH', 'KeyU', 'KeyJ', 'KeyK'];
        
        const pianoContainer = document.getElementById('piano');
        
        function generatePiano() {
            pianoContainer.innerHTML = '';
            for (let octave = 2; octave <= 5; octave++) {
                notes.forEach(note => { createKeyElement(note, octave); });
            }
            createKeyElement('C', 6);
            updateKeyboardMapping(); 
        }

        function createKeyElement(note, octave) {
            const noteName = note + octave;
            const isBlack = note.includes('#');
            const div = document.createElement('div');
            div.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            div.setAttribute('data-note', noteName);
            div.id = `key-${noteName}`;
            
            const span = document.createElement('span');
            div.appendChild(span);
            pianoContainer.appendChild(div);

            div.addEventListener('mousedown', () => pressKey(noteName));
            div.addEventListener('mouseup', () => releaseKey(noteName));
            div.addEventListener('mouseleave', () => releaseKey(noteName));
        }

        generatePiano();

        function updateKeyboardMapping() {
            document.querySelectorAll('.key span').forEach(span => span.innerText = '');
            const chars = currentLang === 'en' ? keyCharsEn : keyCharsKo;
            
            notes.forEach((note, index) => {
                const targetKey = document.getElementById(`key-${note}${baseOctave}`);
                if (targetKey) targetKey.querySelector('span').innerText = currentLang === 'en' ? chars[index].toUpperCase() : chars[index];
            });
            const topC = document.getElementById(`key-C${baseOctave + 1}`);
            if (topC) topC.querySelector('span').innerText = currentLang === 'en' ? 'K' : 'ㅏ';
            
            document.getElementById('current-octave-display').innerText = `키보드 매핑 옥타브: ${baseOctave}`;
        }

        document.getElementById('octave-up').addEventListener('click', () => { if (baseOctave < 5) { baseOctave++; updateKeyboardMapping(); } });
        document.getElementById('octave-down').addEventListener('click', () => { if (baseOctave > 2) { baseOctave--; updateKeyboardMapping(); } });

        function pressKey(noteName) {
            if (activeNotes.has(noteName)) return;
            Tone.start(); 
            sampler.triggerAttack(noteName);
            activeNotes.add(noteName);
            const el = document.getElementById(`key-${noteName}`);
            if(el) el.classList.add('active');
            analyzeChord();
        }

        function releaseKey(noteName) {
            if (!activeNotes.has(noteName)) return;
            sampler.triggerRelease(noteName);
            activeNotes.delete(noteName);
            const el = document.getElementById(`key-${noteName}`);
            if(el) el.classList.remove('active');
            analyzeChord();
        }

        async function analyzeChord() {
            const notesArray = Array.from(activeNotes);
            if (notesArray.length === 0) {
                document.getElementById('primary-chord').innerText = '-';
                document.getElementById('alternative-chords').innerText = '';
                return;
            }
            const response = await fetch('/analyze_chord', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notes: notesArray })
            });
            const result = await response.json();
            
            document.getElementById('primary-chord').innerText = result.primary || 'Unknown';
            
            // 다른 해석(동음이의어 코드 등)이 존재하면 하단에 회색 글씨로 표시
            if (result.alternatives && result.alternatives.length > 0) {
                document.getElementById('alternative-chords').innerText = "또는: " + result.alternatives.join(', ');
            } else {
                document.getElementById('alternative-chords').innerText = '';
            }
        }

        window.addEventListener('keydown', (e) => {
            if(e.repeat) return;
            if (keyCharsKo.includes(e.key)) { if (currentLang !== 'ko') { currentLang = 'ko'; updateKeyboardMapping(); } } 
            else if (keyCharsEn.includes(e.key.toLowerCase())) { if (currentLang !== 'en') { currentLang = 'en'; updateKeyboardMapping(); } }

            const idx = keyCodes.indexOf(e.code);
            if (idx !== -1) {
                let noteName = (idx === 12) ? `C${baseOctave + 1}` : `${notes[idx]}${baseOctave}`;
                pressKey(noteName);
            }
        });

        window.addEventListener('keyup', (e) => {
            const idx = keyCodes.indexOf(e.code);
            if (idx !== -1) {
                let noteName = (idx === 12) ? `C${baseOctave + 1}` : `${notes[idx]}${baseOctave}`;
                releaseKey(noteName);
            }
        });
    </script>
</body>
</html>
