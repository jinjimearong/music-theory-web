<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>직접 해보기 - 화음 분석기</title>
    <!-- 리얼 피아노 소리를 위한 Tone.js 라이브러리 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background-color: #f4f4f4; user-select: none; margin: 0; padding: 20px; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 900px; margin: 0 auto; }
        .home-btn { padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        
        #chord-display { font-size: 4em; margin: 20px; height: 80px; font-weight: bold; color: #2c3e50; }
        
        /* 옥타브 조절기 디자인 */
        .controls { margin-bottom: 20px; }
        .controls button { font-size: 1.2rem; padding: 5px 15px; margin: 0 10px; cursor: pointer; }
        .controls span { font-size: 1.2rem; font-weight: bold; }

        /* 49건반이 가로로 스크롤되거나 꽉 차게 들어가는 컨테이너 */
        .piano-wrapper { overflow-x: auto; padding-bottom: 20px; }
        .piano { display: inline-block; position: relative; white-space: nowrap; }
        
        .key { display: inline-block; border: 1px solid #000; border-radius: 0 0 5px 5px; cursor: pointer; position: relative; box-sizing: border-box; }
        .key span { position: absolute; width: 100%; text-align: center; font-size: 12px; font-weight: bold; pointer-events: none; }
        
        /* 건반 폭을 49개에 맞춰 살짝 줄였습니다. */
        .white-key { width: 35px; height: 160px; background-color: white; z-index: 1; vertical-align: top; }
        .white-key span { bottom: 10px; color: #e74c3c; } 
        .white-key:active, .white-key.active { background-color: #ddd; }
        
        .black-key { width: 22px; height: 100px; background-color: black; position: absolute; margin-left: -11px; z-index: 2; }
        .black-key span { bottom: 10px; color: #e74c3c; }
        .black-key:active, .black-key.active { background-color: #444; }

        /* 로딩 화면 */
        #loading { color: #e74c3c; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="/" class="home-btn">← 홈으로</a>
        <h1>직접 해보기 (49건반)</h1>
        <div style="width: 80px;"></div> <!-- 중앙 정렬을 위한 여백 -->
    </div>

    <div id="loading">피아노 소리를 불러오는 중입니다... (잠시만 기다려주세요)</div>
    
    <div id="chord-display">-</div>

    <div class="controls">
        <button id="octave-down">◀ 옥타브 내림</button>
        <span id="current-octave-display">기준 옥타브: 4</span>
        <button id="octave-up">옥타브 올림 ▶</button>
    </div>

    <div class="piano-wrapper">
        <div class="piano" id="piano">
            <!-- 자바스크립트가 여기에 49개의 건반을 자동으로 생성합니다. -->
        </div>
    </div>

    <script>
        // 1. 실제 그랜드 피아노 샘플 불러오기 (Tone.js)
        const sampler = new Tone.Sampler({
            urls: {
                "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", "A4": "A4.mp3",
                "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", "A5": "A5.mp3",
            },
            release: 1,
            baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => {
                document.getElementById('loading').innerText = "피아노 로딩 완료! 건반을 눌러보세요.";
                document.getElementById('loading').style.color = "#27ae60";
            }
        }).toDestination();

        let activeNotes = new Set();
        let baseOctave = 4; // 컴퓨터 자판이 매핑될 기본 옥타브

        // 자판 배열 (A~K)
        const keyChars = ['a', 'w', 's', 'e', 'd', 'f', 't', 'g', 'y', 'h', 'u', 'j', 'k'];
        
        // 2. 49건반 (C2 ~ C6) 자동 생성 로직
        const pianoContainer = document.getElementById('piano');
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        
        function generatePiano() {
            pianoContainer.innerHTML = ''; // 초기화
            for (let octave = 2; octave <= 5; octave++) {
                notes.forEach(note => {
                    createKeyElement(note, octave);
                });
            }
            createKeyElement('C', 6); // 마지막 49번째 건반
            updateKeyboardMapping(); // 화면에 알파벳 글씨 칠하기
        }

        function createKeyElement(note, octave) {
            const noteName = note + octave;
            const isBlack = note.includes('#');
            const div = document.createElement('div');
            div.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
            div.setAttribute('data-note', noteName);
            div.id = `key-${noteName}`;
            
            const span = document.createElement('span');
            div.appendChild(span);
            pianoContainer.appendChild(div);

            // 마우스 이벤트 연결
            div.addEventListener('mousedown', () => pressKey(noteName));
            div.addEventListener('mouseup', () => releaseKey(noteName));
            div.addEventListener('mouseleave', () => releaseKey(noteName));
        }

        generatePiano();

        // 3. 자판 매핑 업데이트 및 화면 표시
        function updateKeyboardMapping() {
            // 모든 건반의 글씨 지우기
            document.querySelectorAll('.key span').forEach(span => span.innerText = '');
            
            // 현재 baseOctave에 맞춰 글씨 새기기 (C ~ 다음 C까지 13개 건반)
            notes.forEach((note, index) => {
                const targetKey = document.getElementById(`key-${note}${baseOctave}`);
                if (targetKey) targetKey.querySelector('span').innerText = keyChars[index].toUpperCase();
            });
            const topC = document.getElementById(`key-C${baseOctave + 1}`);
            if (topC) topC.querySelector('span').innerText = 'K';
            
            document.getElementById('current-octave-display').innerText = `기준 옥타브: ${baseOctave}`;
        }

        // 4. 옥타브 스위처 버튼 이벤트
        document.getElementById('octave-up').addEventListener('click', () => {
            if (baseOctave < 5) { baseOctave++; updateKeyboardMapping(); }
        });
        document.getElementById('octave-down').addEventListener('click', () => {
            if (baseOctave > 2) { baseOctave--; updateKeyboardMapping(); }
        });

        // 5. 소리 재생 및 파이썬 서버 통신 로직
        function pressKey(noteName) {
            if (activeNotes.has(noteName)) return;
            Tone.start(); // 브라우저 오디오 정책 우회
            sampler.triggerAttack(noteName);
            activeNotes.add(noteName);
            const el = document.getElementById(`key-${noteName}`);
            if(el) el.classList.add('active');
            analyzeChord();
        }

        function releaseKey(noteName) {
            if (!activeNotes.has(noteName)) return;
            sampler.triggerRelease(noteName);
            activeNotes.delete(noteName);
            const el = document.getElementById(`key-${noteName}`);
            if(el) el.classList.remove('active');
            analyzeChord();
        }

        async function analyzeChord() {
            const notesArray = Array.from(activeNotes);
            if (notesArray.length === 0) {
                document.getElementById('chord-display').innerText = '-';
                return;
            }
            const response = await fetch('/analyze_chord', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notes: notesArray })
            });
            const result = await response.json();
            document.getElementById('chord-display').innerText = result.chord || 'Unknown';
        }

        // 6. 컴퓨터 키보드 입력 이벤트
        window.addEventListener('keydown', (e) => {
            if(e.repeat) return;
            const index = keyChars.indexOf(e.key.toLowerCase());
            if (index !== -1) {
                let noteName;
                if (index === 12) noteName = `C${baseOctave + 1}`; // K 키는 다음 옥타브 도
                else noteName = `${notes[index]}${baseOctave}`;
                pressKey(noteName);
            }
        });

        window.addEventListener('keyup', (e) => {
            const index = keyChars.indexOf(e.key.toLowerCase());
            if (index !== -1) {
                let noteName;
                if (index === 12) noteName = `C${baseOctave + 1}`;
                else noteName = `${notes[index]}${baseOctave}`;
                releaseKey(noteName);
            }
        });
    </script>
</body>
</html>
